<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salga-Zap · Cardápio</title>
    <link rel="stylesheet" href="menu_screen.css">
</head>

<body>
    <div class="cardapio">
        <div class="header">
            <div class="header-info">
                <span class="header-logo"> 🥟 Salga-Zap</span>
                <span class="header-sub"> Salgadeira da Dona Sônia</span>
            </div>
            <button class="carrinho"> 🛒 3 itens</button>
        </div>

        <div class="bem_vindo">
            <p class="bem_vindo_cliente">Olá! Bem-vindo(a) 👋</p>
            <h2 class="escolha_de_hoje">O que vai querer hoje?</h2>
        </div>
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Buscar salgado..." />
        </div>

        <div class="button-filter-food">
            <button class="active" data-cat="todos"><b>Todos</b></button>
            <button data-cat="fritos">🔥 <b>Fritos</b></button>
            <button data-cat="assados">🥐 <b>Assados</b></button>
            <button data-cat="doces">🍬 <b>Doces</b></button>
            <button data-cat="bebidas">🥤 <b>Bebidas</b></button>
            <button data-cat="marmitas">🍲 <b>Marmitas</b></button>
            <button data-cat="especiais">🥘 <b>Especiais da semana</b></button>
        </div>
        <div class="foods">
            <div class="item" data-cat="todos">
                <p><b>Todos os itens</b></p>
            </div>
        </div>

        <div class="container-foods">
            <div class="card-item">
                <div class="card-img">🍗</div>
                <div class="card-info">
                    <h3 class="nome-item"><b>Coxinha de Frango</b></h3>
                    <p class="descricao-item">Recheio cremoso de frango</p>
                    <p class="preco-item"><b>R$ 4,00</b></p>
                </div>
                <div class="contador-container">
                    <button class="btn-contador btn-ativo">−</button>
                    <button class="btn-contador btn-ativo">+</button>
                </div>
            </div>

</body>

</html>
