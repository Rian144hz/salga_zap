<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salga-Zap · Dados do pedido</title>
    <link rel="stylesheet" href="data_screen.css">
</head>

<body>

    <div class="parte_red_dados">
        <a href="../car_screen/car_screen.html">
            <div class="botao_volta_dados"></div>
        </a>
        <div class="textos_header">
            <div class="dados"><b>Dados do pedido</b></div>
            <div class="quase_la">Quase lá! </div>
        </div>
    </div>

    <div class="seu_nome">
        <h4 class="nome_cliente">👤 SEU NOME</h4>
    </div>
    <div class="card_nome_cliente">
        <input type="text" placeholder="Ex: Maria Silva" />
    </div>

    <div class="seu_zap">
        <h4 class="zap_cliente">📱 WHATSAPP (opcional)</h4>
    </div>
    <div class="card_zap_cliente">
        <input type="number" placeholder="Ex: (75) 9 99999999" />
    </div>

    <div class="tipo_entrega">
        <h4 class="tipo_de_entrega">🚚 TIPO DE ENTREGA</h4>
    </div>

    <div class="opcao-entrega-container">

        <div class="card-opcao ativo">
            <div class="opcao-emoji">🏃</div>
            <span class="opcao-texto">Retirar</span>
        </div>

        <div class="card-opcao">
            <div class="opcao-emoji">🛵</div>
            <span class="opcao-texto">Entrega</span>
        </div>

    </div>

    <div class="forma_pagamento">
        <h4 class="forma_pagamentoo">💳 FORMA DE PAGAMENTO</h4>
    </div>


    <div class="opcao-pagamento-container">

        <div class="card-opcao ativo">
            <div class="opcao_emoji_money">💵</div>
            <span class="opcao_texto_money">Dinheiro</span>
        </div>

        <div class="card-opcao">
            <div class="opcao_emoji_pix">📱</div>
            <span class="opcao_texto_pix">Pix</span>
        </div>
        <div class="card-opcao">
            <a href="../data_screen/cartao.html"
                style="text-decoration: none; color: inherit; display: block; width: 100%; height: 100%;">
                <div class="opcao_emoji_cartao">💳</div>
                <span class="opcao_texto_cartao">Cartão</span>
            </a>
        </div>
    </div>

    <div class="troco">
        <h4 class="quanto_de_troco">💰 TROCO PARA QUANTO?</h4>
    </div>

    <div class="card_troco_cliente">
        <input type="number" placeholder="Ex: R$ 50,00" />
    </div>

    <div class="pix-qrcode-container" style="display:none; text-align:center; margin-left: 90px;">
        <div id="pix-qrcode"></div>
        <p style=" margin-right:90px; margin-top:10px; font-size:14px; word-break:break-all;" id="pix-copia-cola"></p>
    </div>

    <div class="button">
        <a href="../confirm_order/confirm_order.html">
            <button class="revisar_pedido"><b>Revisar Pedido →</b></button>
        </a>
    </div>

    <script src="data_screen.js"></script>
</body>

</html>
