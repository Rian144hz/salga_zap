<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salga-Zap · Carrinho</title>
    <link rel="stylesheet" href="car_screen.css">
    <link rel="manifest" href="../manifest.webmanifest">
    <meta name="theme-color" content="#E8440A">
</head>

<body>

    <div class="parte_red">
        <a href="../menu_screen/menu_screen.html">
            <div class="botao_volta"></div>
        </a>
        <div class="textos_header">
            <div class="meu_carrinho"><b>Meu carrinho</b></div>
            <div class="qtd_itens">3 itens</div>
        </div>
    </div>

    <div class="container-food">
        <div class="card-item">
            <div class="card-img">🍗</div>

            <div class="card-info">
                <h3 class="nome-item">Coxinha de Frango</h3>
                <p class="descricao-item">2× R$ 4,00 cada</p>
            </div>
            <div class="preco_header">
                <div class="preco">R$ 8,00</div>
                <div class="xis">✕</div>
            </div>
        </div>
    </div>



    <div class="container-food">
        <div class="card-item">
            <div class="card-img">🥩</div>

            <div class="card-info">
                <h3 class="nome-item">Kibe frito</h3>
                <p class="descricao-item">1× R$ 3,50 cada</p>
            </div>
            <div class="preco_header">
                <div class="preco">R$ 3,50</div>
                <div class="xis">✕</div>
            </div>
        </div>
    </div>

    <div class="container-food">
        <div class="card-item">
            <div class="card-img">🥟</div>

            <div class="card-info">
                <h3 class="nome-item">Kibe frito</h3>
                <p class="descricao-item">1× R$ 5,00 cada</p>
            </div>
            <div class="preco_header">
                <div class="preco">R$ 5,00</div>
                <div class="xis">✕</div>
            </div>
        </div>
    </div>

    <div class="obs_header">
        <span><b>📝 Observações</b></span>
    </div>

    <div class="observacoes">
        <input type="text" placeholder="Ex: sem cebola, bem frito..." />
    </div>

    <div class="resumo-card">
        <h4 class="resumo-titulo">RESUMO DO PEDIDO</h4>

        <div class="resumo-lista">
            <div class="resumo-linha">
                <span>2× Coxinha de Frango</span>
                <span>R$ 8,00</span>
            </div>
            <div class="resumo-linha">
                <span>1× Kibe Frito</span>
                <span>R$ 3,50</span>
            </div>
            <div class="resumo-linha">
                <span>1× Pastel de Frango</span>
                <span>R$ 5,00</span>
            </div>
        </div>

        <hr class="resumo-divisor">

        <div class="resumo-total">
            <span class="total-texto">Total</span>
            <span class="total-valor">R$ 16,50</span>
        </div>
    </div>

    <div class="button">
        <a href="../data_screen/data_screen.html">
            <button class="continue_button"><b>Continuar → Dados do Pedido</b></button>
        </a>
    </div>
    <script src="car_screen.js"></script>
    <script src="../register-sw.js"></script>
</body>


</html>
